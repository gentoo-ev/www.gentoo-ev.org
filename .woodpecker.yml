when:
  branch: [master, woodpecker]
  event: [push, pull_request, manual]

steps:
  - name: checkout
    image: plugins/git
    settings:
      depth: 1

  - name: build
    image: plugins/kaniko
    settings:
      dry-run: true
      registry: ""

